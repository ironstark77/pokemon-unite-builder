<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Unite — Build Maker</title>
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link rel="preconnect" href="https://www.serebii.net">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap">
<style>
/* ============================================================
   POKÉMON UNITE BUILD MAKER — STYLE
   Dark, neon-accented, modern, inspired by Unite UI
   ============================================================ */
:root {
  --bg-base: #0a0e1a;
  --bg-elevated: #111726;
  --bg-card: #1a2236;
  --bg-card-hover: #232b42;
  --border: #2a3550;
  --border-bright: #3d4d72;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-yellow: #fbbf24;
  --accent-red: #ef4444;
  --accent-green: #22c55e;
  --accent-purple: #a855f7;
  --accent-orange: #f97316;
  --accent-pink: #ec4899;
  --gradient-blue: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  --gradient-yellow: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  --gradient-red: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  --gradient-green: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  --gradient-purple: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
  --gradient-orange: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
  --gradient-pink: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.5);
  --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.3);
  --shadow-glow-yellow: 0 0 20px rgba(251, 191, 36, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(168, 85, 247, 0.1), transparent),
    radial-gradient(ellipse 60% 50% at 0% 100%, rgba(34, 197, 94, 0.1), transparent);
  background-attachment: fixed;
}

/* ============================================================
   HEADER
   ============================================================ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.app-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fbbf24 0%, #f97316 50%, #ef4444 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.app-title .pokeball {
  display: inline-block;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(180deg, #ef4444 50%, #f1f5f9 50%);
  border: 3px solid #1a2236;
  position: relative;
  flex-shrink: 0;
}
.app-title .pokeball::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  background: #f1f5f9;
  border: 2px solid #1a2236;
  border-radius: 50%;
}
.lang-switcher {
  display: flex;
  gap: 0.25rem;
  background: var(--bg-card);
  padding: 0.25rem;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.lang-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  padding: 0.4rem 0.9rem;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.lang-btn:hover { color: var(--text-primary); }
.lang-btn.active {
  background: var(--gradient-blue);
  color: white;
  box-shadow: var(--shadow-glow-blue);
}

/* ============================================================
   LAYOUT
   ============================================================ */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 1.5rem;
  padding: 1.5rem 2rem;
  max-width: 1600px;
  margin: 0 auto;
}
/* ============================================================
   RESPONSIVE — mobile-first
   Default: mobile layout (selector + content stacked, no sticky)
   Desktop: >=900px gets side-by-side layout with selector always visible
   ============================================================ */

/* Layout always stacks (mobile-first) */
.layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
  padding: 1rem;
  max-width: 1600px;
  margin: 0 auto;
}

/* Header padding for mobile */
.app-header {
  padding: 0.75rem 1rem;
}
.app-title { font-size: 1.2rem; }

/* Pokemon list: horizontal scroll on mobile (4-5 visible) */
.pokemon-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  max-height: 280px;
  overflow-y: auto;
}
.pokemon-tile {
  flex: 0 0 calc((100% - 4 * 0.4rem) / 5); /* 5 per row on mobile */
  min-width: 0;
  padding: 0.4rem 0.2rem;
}
.pokemon-tile img {
  width: 44px;
  height: 44px;
}
.pokemon-tile .pkmn-name { font-size: 0.65rem; }
.pokemon-tile .pkmn-role { font-size: 0.55rem; }

/* Item cards: 1 col on mobile */
.items-grid { grid-template-columns: 1fr; }
.battle-row { grid-template-columns: 1fr; }
.matchup-grid { grid-template-columns: 1fr; }
.pkmn-header { flex-direction: column; text-align: center; padding: 1rem; }
.pkmn-sprite { width: 96px; height: 96px; }
.pkmn-name-big { font-size: 1.6rem; }
.pkmn-tags { justify-content: center; }
.item-slot { padding: 0.75rem; }
.section { padding: 1rem; }
.section h2 { font-size: 1rem; }

/* On mobile: panel is a fullscreen bottom sheet when open */
.pkmn-panel {
  position: fixed;
  inset: 0;
  z-index: 100;
  border-radius: 0;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 1.5rem 1rem;
  padding-top: 1rem;
}
.pkmn-panel.is-open {
  transform: translateY(0);
}
.pkmn-panel-header { display: flex; }
.pkmn-panel-close { display: flex; }

/* Pokemon list inside open panel: larger tiles */
.pkmn-panel .pokemon-list {
  max-height: none;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
}
.pkmn-panel .pokemon-tile {
  flex: none;
  padding: 0.5rem 0.3rem;
}
.pkmn-panel .pokemon-tile img {
  width: 56px;
  height: 56px;
}
.pkmn-panel .pokemon-tile .pkmn-name { font-size: 0.7rem; }
.pkmn-panel .pokemon-tile .pkmn-role { font-size: 0.6rem; }

/* ============================================================
   TABLET — foldable vertical (e.g. Z Flip open) and small tablets
   ============================================================ */
@media (min-width: 600px) {
  .pokemon-list { max-height: 320px; }
  .pokemon-tile { flex: 0 0 calc((100% - 5 * 0.4rem) / 6); }
  .pkmn-panel .pokemon-list { grid-template-columns: repeat(5, 1fr); }
  .pkmn-name-big { font-size: 1.8rem; }
  .pkmn-header { flex-direction: row; text-align: left; }
  .pkmn-tags { justify-content: flex-start; }
  .items-grid { grid-template-columns: repeat(2, 1fr); }
  .battle-row { grid-template-columns: 1fr 1fr; }
  .matchup-grid { grid-template-columns: 1fr 1fr; }
  .pkmn-sprite { width: 112px; height: 112px; }
  .layout { padding: 1.25rem; }
}

/* ============================================================
   FOLDABLE HORIZONTAL — Z Fold / Z Fold 2 open like a tablet
   Galaxy Z Fold inner display: 673x841 CSS px, viewport segments
   ============================================================ */
@media (min-width: 700px) and (max-width: 900px) {
  /* Use viewport segments for foldables if available */
  @supports (display: flex) and (gap: env(fold-left, 0px)) {
    .layout {
      padding-left: max(1rem, env(fold-left));
      padding-right: max(1rem, env(fold-right));
    }
  }
  .items-grid { grid-template-columns: repeat(3, 1fr); }
  .pkmn-name-big { font-size: 2rem; }
  .pkmn-sprite { width: 128px; height: 128px; }
}

/* ============================================================
   DESKTOP — 900px+ gets side-by-side layout
   ============================================================ */
@media (min-width: 900px) {
  .layout {
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
  }
  .app-header { padding: 1rem 2rem; }
  .app-title { font-size: 1.5rem; }
  /* On desktop, hide the collapsed selector and always show the panel inline */
  .pkmn-selector { display: none; }
  .pkmn-panel {
    position: sticky;
    top: 5.5rem;
    inset: auto;
    transform: none;
    border-radius: 16px;
    max-height: calc(100vh - 6.5rem);
    overflow-y: auto;
    transition: none;
  }
  .pkmn-panel-header { display: none; }
  .pkmn-panel-close { display: none; }
  .pkmn-panel .pokemon-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-height: none;
    overflow: visible;
  }
  .pkmn-panel .pokemon-tile {
    flex: none;
  }
  .pokemon-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-height: none;
    overflow: visible;
  }
  .pokemon-tile {
    flex: none;
  }
  .pokemon-tile img {
    width: 56px;
    height: 56px;
  }
  .pokemon-tile .pkmn-name { font-size: 0.7rem; }
  .pokemon-tile .pkmn-role { font-size: 0.6rem; }
  .items-grid { grid-template-columns: repeat(3, 1fr); }
  .pkmn-name-big { font-size: 2.2rem; }
  .pkmn-sprite { width: 128px; height: 128px; }
}

/* ============================================================
   LARGE DESKTOP
   ============================================================ */
@media (min-width: 1200px) {
  .layout { padding: 1.5rem 2rem; }
  .pkmn-panel .pokemon-list { grid-template-columns: repeat(3, 1fr); }
  .pokemon-list { grid-template-columns: repeat(3, 1fr); }
}

/* ============================================================
   TOUCH-FRIENDLY TWEAKS
   ============================================================ */
@media (hover: none) and (pointer: coarse) {
  /* Touch device: bigger tap targets */
  .pkmn-selector { padding: 1rem; }
  .pokemon-tile { min-height: 84px; }
  .role-chip { padding: 0.45rem 0.85rem; font-size: 0.85rem; }
  .lang-btn { padding: 0.5rem 1rem; }
  /* Disable hover transforms on touch */
  .pokemon-tile:hover { transform: none; }
  .item-slot:hover { transform: none; }
  /* Better scroll behavior on iOS */
  .pkmn-panel { -webkit-overflow-scrolling: touch; }
}

/* ============================================================
   FOLDABLE-SPECIFIC — environment variables for hinge detection
   (Chrome supports fold/unfold media features and env() for fold-* variables)
   ============================================================ */
@media (horizontal-viewport-segments: 2) {
  /* Device has 2 horizontal viewport segments (fold open horizontally) */
  .layout {
    padding-left: env(viewport-segment-width 0 0);
    padding-right: env(viewport-segment-width 1 0);
  }
}

/* ============================================================
   SIDEBAR (pokemon selector) — mobile-first
   ============================================================ */
.sidebar {
  /* No background, no padding on the wrapper; the panel handles it */
  position: relative;
  z-index: 50;
}

/* ----- Collapsed selector button (always visible) ----- */
.pkmn-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.85rem 1rem;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1rem;
  text-align: left;
}
.pkmn-selector:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-bright);
}
.pkmn-selector.is-active {
  border-color: var(--accent-yellow);
  box-shadow: var(--shadow-glow-yellow);
}
.pkmn-selector-content {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  min-width: 0;
  flex: 1;
}
.pkmn-selector-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
  border: 1px solid var(--border);
  overflow: hidden;
}
.pkmn-selector-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}
.pkmn-selector-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}
.pkmn-selector-label {
  font-weight: 700;
  font-size: 1rem;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pkmn-selector-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 0.15rem;
}
.pkmn-selector-chevron {
  font-size: 1.4rem;
  color: var(--text-secondary);
  flex-shrink: 0;
  margin-left: 0.5rem;
  transition: transform 0.2s;
}
.pkmn-selector.is-open .pkmn-selector-chevron {
  transform: rotate(180deg);
}

/* ----- Backdrop for mobile (taps close the panel) ----- */
.pkmn-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.pkmn-backdrop.is-visible {
  opacity: 1;
  pointer-events: auto;
}

/* ----- Panel (the full selector) ----- */
.pkmn-panel {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
}
/* Panel header (close button only shown on mobile) */
.pkmn-panel-header {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}
.pkmn-panel-close {
  display: none;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.pkmn-panel-close:hover { background: var(--bg-card-hover); }

.pkmn-panel h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.pkmn-panel h2::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent-yellow);
  border-radius: 2px;
}
.filter-bar {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 0.9rem;
  color: var(--text-primary);
  font-size: 0.9rem;
  font-family: inherit;
  transition: all 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}
.search-input::placeholder { color: var(--text-muted); }
.role-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}
.role-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 0.3rem 0.7rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.role-chip:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.role-chip.active {
  color: white;
  border-color: transparent;
}
.role-chip[data-role="Attacker"].active { background: var(--gradient-red); }
.role-chip[data-role="All-Rounder"].active { background: var(--gradient-orange); }
.role-chip[data-role="Defender"].active { background: var(--gradient-blue); }
.role-chip[data-role="Speedster"].active { background: var(--gradient-yellow); }
.role-chip[data-role="Supporter"].active { background: var(--gradient-green); }
.role-chip[data-role="All"].active { background: var(--gradient-purple); }

.pokemon-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}
.pokemon-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.5rem 0.3rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.pokemon-tile:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-bright);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.pokemon-tile.selected {
  border-color: var(--accent-yellow);
  box-shadow: 0 0 0 2px var(--accent-yellow), var(--shadow-glow-yellow);
  background: var(--bg-card-hover);
}
.pokemon-tile img {
  width: 56px;
  height: 56px;
  image-rendering: pixelated;
  display: block;
  margin: 0 auto 0.25rem;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
.pokemon-tile .pkmn-name {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pokemon-tile .pkmn-role {
  font-size: 0.6rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  margin-top: 0.1rem;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  min-width: 0;
}
.empty-state {
  background: var(--bg-elevated);
  border: 1px dashed var(--border-bright);
  border-radius: 16px;
  padding: 4rem 2rem;
  text-align: center;
  color: var(--text-secondary);
}
.empty-state .big-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  filter: grayscale(0.5);
}
.empty-state h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

/* ============================================================
   POKEMON HEADER CARD
   ============================================================ */
.pkmn-header {
  background: var(--bg-elevated);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.pkmn-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--header-gradient, var(--gradient-blue));
  opacity: 0.15;
  z-index: 0;
}
.pkmn-header > * { position: relative; z-index: 1; }
.pkmn-sprite {
  width: 128px;
  height: 128px;
  image-rendering: pixelated;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
  flex-shrink: 0;
}
.pkmn-info { flex: 1; min-width: 0; }
.pkmn-name-big {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 0.5rem;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
.pkmn-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
}
.tag {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.25rem 0.7rem;
  border-radius: 999px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
}
.tag.role-Attacker { background: var(--gradient-red); }
.tag.role-All-Rounder { background: var(--gradient-orange); }
.tag.role-Defender { background: var(--gradient-blue); }
.tag.role-Speedster { background: var(--gradient-yellow); color: #1a1a1a; }
.tag.role-Supporter { background: var(--gradient-green); }

/* ============================================================
   SECTION CARD
   ============================================================ */
.section {
  background: var(--bg-elevated);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.section h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.section h2 .icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;

// Pokémon data (30 Pokemon, abbreviated for inlining - this would normally be loaded from JSON)
// Full data is loaded from data_pokemon.json via fetch below
let POKEMON_DATA = [];

/* ============================================================
   INITIALIZATION
   ============================================================ */

function init() {
  // POKEMON_DATA is already populated by the bootstrap block at the end of the script
  // (which assigns from the embedded POKEMON_DATA_RAW). If empty for any reason, log it.
  if (POKEMON_DATA.length === 0) {
    console.error('POKEMON_DATA is empty. Raw data:', POKEMON_DATA_RAW);
  }
  setupLangSwitcher();
  setupRoleFilter();
  setupSearch();
  setupPkmnPanel();
  renderPokemonList();
}

function setupLangSwitcher() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      updateI18n();
      renderPokemonList();
      if (currentPokemon) renderPokemonDetail(currentPokemon);
    });
  });
}

function updateI18n() {
  document.querySelectorAll('[data-es]').forEach(el => {
    el.textContent = el.dataset[currentLang];
  });
  document.querySelectorAll('[data-' + currentLang + '-ph]').forEach(el => {
    el.placeholder = el.getAttribute('data-' + currentLang + '-ph');
  });
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.placeholder = currentLang === 'es' ? 'Buscar... (Pikachu)' : 'Search... (Pikachu)';
  const sidebarTitle = document.getElementById('sidebarTitle');
  if (sidebarTitle) sidebarTitle.textContent = currentLang === 'es' ? 'Pokémon' : 'Pokémon';
  // Update role filter labels
  document.querySelectorAll('.role-chip').forEach(chip => {
    if (chip.dataset[currentLang]) chip.textContent = chip.dataset[currentLang];
  });
}

function setupRoleFilter() {
  document.querySelectorAll('.role-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentRoleFilter = chip.dataset.role;
      renderPokemonList();
    });
  });
}

function setupSearch() {
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase();
    renderPokemonList();
  });
}

function renderPokemonList() {
  const list = document.getElementById('pokemonList');
  let filtered = POKEMON_DATA;
  if (currentRoleFilter !== 'All') {
    filtered = filtered.filter(p => p.role === currentRoleFilter);
  }
  if (searchQuery) {
    filtered = filtered.filter(p =>
      p.name_en.toLowerCase().includes(searchQuery) ||
      (p.name_es && p.name_es.toLowerCase().includes(searchQuery))
    );
  }
  list.innerHTML = filtered.map(p => {
    const roleLabel = I18N[currentLang][p.role] || p.role;
    return `
      <div class="pokemon-tile ${currentPokemon && currentPokemon.id === p.id ? 'selected' : ''}" data-id="${p.id}">
        <img src="${p.sprite_url}" alt="${p['name_' + currentLang]}" loading="lazy" onerror="this.style.opacity='0.3'">
        <div class="pkmn-name">${p['name_' + currentLang]}</div>
        <div class="pkmn-role">${roleLabel}</div>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.pokemon-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const pkmn = POKEMON_DATA.find(p => p.id === tile.dataset.id);
      if (pkmn) {
        currentPokemon = pkmn;
        renderPokemonList();
        renderPokemonDetail(pkmn);
        // Close mobile panel after selecting
        closePkmnPanel();
        // Update the collapsed selector to show the selected pokemon
        updatePkmnSelector(pkmn);
      }
    });
  });
}

function updatePkmnSelector(pkmn) {
  if (!pkmn) return;
  const icon = document.getElementById('pkmnSelectorIcon');
  const label = document.querySelector('.pkmn-selector-label');
  const sub = document.querySelector('.pkmn-selector-sub');
  const selector = document.getElementById('pkmnSelector');
  if (icon) {
    icon.innerHTML = `<img src="${pkmn.sprite_url}" alt="${pkmn['name_' + currentLang]}">`;
  }
  if (label) {
    label.textContent = pkmn['name_' + currentLang];
    label.removeAttribute('data-es');
    label.removeAttribute('data-en');
  }
  if (sub) {
    sub.textContent = (I18N[currentLang] && I18N[currentLang][pkmn.role]) || pkmn.role;
    sub.removeAttribute('data-es');
    sub.removeAttribute('data-en');
  }
  if (selector) {
    selector.classList.add('is-active');
  }
}

function openPkmnPanel() {
  document.getElementById('pkmnPanel')?.classList.add('is-open');
  document.getElementById('pkmnBackdrop')?.classList.add('is-visible');
  document.getElementById('pkmnSelector')?.classList.add('is-open');
  document.getElementById('pkmnSelector')?.setAttribute('aria-expanded', 'true');
  document.body.style.overflow = 'hidden';
}

function closePkmnPanel() {
  document.getElementById('pkmnPanel')?.classList.remove('is-open');
  document.getElementById('pkmnBackdrop')?.classList.remove('is-visible');
  document.getElementById('pkmnSelector')?.classList.remove('is-open');
  document.getElementById('pkmnSelector')?.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}

function setupPkmnPanel() {
  const selector = document.getElementById('pkmnSelector');
  const closeBtn = document.getElementById('pkmnPanelClose');
  const backdrop = document.getElementById('pkmnBackdrop');
  if (selector) {
    selector.addEventListener('click', openPkmnPanel);
  }
  if (closeBtn) {
    closeBtn.addEventListener('click', closePkmnPanel);
  }
  if (backdrop) {
    backdrop.addEventListener('click', closePkmnPanel);
  }
  // ESC to close
  document.addEventListener('keydown', (e) => {

function renderPokemonDetail(p) {

  // Held items details

      <div style="flex:1">
        <div class="slot-label">${t.primary}</div>
        <div class="item-name">${battle['name_' + currentLang]}</div>
        <div class="item-effect">${battle['effect_' + currentLang]}</div>

      </div>

  const battleAltHtml = battleAlt ? `
    <div class="battle-card" style="opacity:0.85">
      <img class="item-icon" src="${battleAlt.icon_url}" alt="${battleAlt['name_' + currentLang]}" onerror="this.style.opacity='0.3'">
      <div style="flex:1">
        <div class="slot-label">${t.alt_label}</div>
        <div class="item-name">${battleAlt['name_' + currentLang]}</div>
        <div class="item-effect">${battleAlt['effect_' + currentLang]}</div>
        <div class="item-synergy">${battleAlt['synergy_' + currentLang]}</div>
      </div>
    </div>
  ` : '';

  // Moves
  const movesHtml = build['moves_' + currentLang].map(m => `<div class="move-line"><div class="move-name">${m}</div></div>`).join('');
  const uniteHtml = build['unite_move_' + currentLang] ? `<div class="move-line unite"><div class="move-label">${t.unite_move}</div><div class="move-name">${build['unite_move_' + currentLang]}</div></div>` : '';

  // Emblems — interactive board (10/10 counter + grid + efecto actual + color sets + why)
  const pkmnEmblemsData = (typeof EMBLEMS_PER_POKEMON !== 'undefined' && EMBLEMS_PER_POKEMON) ? EMBLEMS_PER_POKEMON[p.id] : null;
  let emblemBoardHtml = '';
  let totalBonus = '';
  let emblemWhyHtml = '';

  // Helper: aggregate all_stats across the 10 emblems into a per-stat total
  function aggregateEmblemStats(emblemsArr) {
    const agg = {};
    (emblemsArr || []).forEach(em => {
      (em.all_stats || []).forEach(s => {
        const key = s['stat_' + currentLang] || s.stat_en;
        agg[key] = (agg[key] || 0) + (s.value || 0);
      });
    });
    return agg;
  }

  // Helper: render the "efecto actual" panel
  function renderEfectoActual(emblemsArr) {
    if (!emblemsArr || emblemsArr.length === 0) {
      const fallback = currentLang === 'es' ? 'Sin datos individuales.' : 'No individual stat data.';
      return `<div class="efecto-actual"><div class="efecto-actual-title">${currentLang === 'es' ? 'Efecto actual' : 'Current effect'}</div><div class="efecto-actual-empty">${fallback}</div></div>`;
    }
    const agg = aggregateEmblemStats(emblemsArr);
    const entries = Object.entries(agg).sort((a, b) => {
      // Sort: positive first by magnitude desc, then negative by magnitude desc
      if (a[1] >= 0 && b[1] < 0) return -1;
      if (a[1] < 0 && b[1] >= 0) return 1;
      return Math.abs(b[1]) - Math.abs(a[1]);
    });
    if (entries.length === 0) {
      const fallback = currentLang === 'es' ? 'Los emblemas otorgan stats en su mayoría sin agregados (efectos de set).' : 'Emblems mostly grant set bonuses, no flat stat aggregates.';
      return `<div class="efecto-actual"><div class="efecto-actual-title">${currentLang === 'es' ? 'Efecto actual' : 'Current effect'}</div><div class="efecto-actual-empty">${fallback}</div></div>`;
    }
    const lis = entries.map(([k, v]) => {
      const cls = v > 0 ? 'pos' : (v < 0 ? 'neg' : 'zero');
      const sign = v > 0 ? '+' : '';
      // Format: if integer, no decimal; if small decimal, 1 dec; if percent, add %
      let valStr;
      if (Math.abs(v) >= 100 || v === Math.floor(v)) {
        valStr = sign + v;
      } else {
        valStr = sign + v.toFixed(1).replace(/\.0$/, '');
      }
      return `<li><span class="stat-name">${k}</span><span class="stat-val ${cls}">${valStr}</span></li>`;
    }).join('');
    return `<div class="efecto-actual">
      <div class="efecto-actual-title">${currentLang === 'es' ? 'Efecto actual' : 'Current effect'}</div>
      <ul class="efecto-actual-list">${lis}</ul>
    </div>`;
  }

  // Helper: render the color sets panel (right side)
  function renderSetsBoard(setBonuses) {
    if (!setBonuses || setBonuses.length === 0) {
      // fallback: use build.emblem_set
      const fb = (build['emblem_set_' + currentLang] || '').trim();
      if (!fb) return '';
      const colors = build['emblem_colors_' + currentLang] || build.emblem_colors_en || [];
      const rows = colors.map(c => {
        const colorData = EMBLEMS.colors[c] || EMBLEMS.colors[(c||'').toLowerCase()] || {};
        const hex = colorData.hex || '#888';
        const name = colorData[currentLang] || colorData.name_en || c;
        return `<div class="set-row">
          <span class="set-row-icon" style="background:${hex}"></span>
          <span class="set-row-name">${name}</span>
        </div>`;
      }).join('');
      return `<div class="sets-board">
        <div class="sets-board-title">${currentLang === 'es' ? 'Sets de color' : 'Color sets'}</div>
        ${rows}
      </div>`;
    }
    const rows = setBonuses.map(sb => {
      const colorData = EMBLEMS.colors[sb.color] || EMBLEMS.colors[(sb.color||'').toLowerCase()] || {};
      const hex = colorData.hex || '#888';
      const name = sb['color_es'] || sb.color || colorData[currentLang] || colorData.name_en || '';
      const statName = sb['stat_es'] || sb.stat || '';
      const cnt = sb.count || 0;
      const thr = sb.threshold || 0;
      const pct = sb.bonus_pct || 0;
      // Build the threshold circles (only show up to the threshold; mark the rest as inactive)
      const maxT = Math.max(thr, cnt);
      const circles = [];
      for (let i = 1; i <= maxT; i++) {
        const active = i <= thr;
        const filled = i <= cnt;
        circles.push(`<span class="set-row-thresh ${active ? 'active' : 'inactive'}" style="${filled && active ? 'background:'+hex : ''}">${i}</span>`);
      }
      return `<div class="set-row">
        <span class="set-row-icon" style="background:${hex}"></span>
        <span class="set-row-name">${name}</span>
        <span class="set-row-thresholds">${circles.join('')}</span>
        <span class="set-row-bonus">+${pct}% ${statName}</span>
      </div>`;
    }).join('');
    return `<div class="sets-board">
      <div class="sets-board-title">${currentLang === 'es' ? 'Sets de color (bonus)' : 'Color sets (bonuses)'}</div>

  // Helper: render the 10/10 counter wrap
  function renderCounter(n) {
    const title = currentLang === 'es' ? 'Emblemas equipados' : 'Emblems equipped';

    }
    return `<div class="emblem-why">${explanation}</div>`;

  if (pkmnEmblemsData && pkmnEmblemsData.emblems && pkmnEmblemsData.emblems.length > 0) {

// Helper: try to find a pokemon in our data from a free-text mention
function guessPokemon(text) {
  const lower = text.toLowerCase();
  // Remove common stopwords/parens
  const cleaned = lower.replace(/\(.*?\)/g, '').trim();
  for (const p of POKEMON_DATA) {
    if (cleaned.includes(p.name_en.toLowerCase())) return p;
    if (p.name_es && cleaned.includes(p.name_es.toLowerCase())) return p;
  }
  return null;
}

function shadeColor(hex, percent) {
  // Lighten/darken a hex color
  let R = parseInt(hex.substring(1, 3), 16);
  let G = parseInt(hex.substring(3, 5), 16);
  let B = parseInt(hex.substring(5, 7), 16);
  R = Math.max(0, Math.min(255, R + (R * percent / 100)));
  G = Math.max(0, Math.min(255, G + (G * percent / 100)));
  B = Math.max(0, Math.min(255, B + (B * percent / 100)));
  const RR = Math.round(R).toString(16).padStart(2, '0');
  const GG = Math.round(G).toString(16).padStart(2, '0');
  const BB = Math.round(B).toString(16).padStart(2, '0');
  return '#' + RR + GG + BB;
}
